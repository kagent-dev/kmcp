name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1

      - name: Build controller image
        run: make docker-build CONTROLLER_IMG=ghcr.io/kagent-dev/kmcp/controller:e2e-test
        timeout-minutes: 15

      - name: Load image into Kind
        run: make kind-load CONTROLLER_IMG=ghcr.io/kagent-dev/kmcp/controller:e2e-test
        timeout-minutes: 5

      - name: Run e2e tests
        run: |
          go mod tidy
          make test-e2e
        timeout-minutes: 20
