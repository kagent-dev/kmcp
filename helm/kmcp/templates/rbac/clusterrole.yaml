{{- define "kmcp.manager.rules" -}}
- apiGroups:
  - ""
  resources:
  - configmaps
  - services
  - serviceaccounts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kagent.dev
  resources:
  - mcpservers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kagent.dev
  resources:
  - mcpservers/finalizers
  verbs:
  - update
- apiGroups:
  - kagent.dev
  resources:
  - mcpservers/status
  verbs:
  - get
  - patch
  - update
{{- end -}}

{{- if .Values.rbac.create }}
{{- include "kmcp.rbac.validate" . -}}
{{- if .Values.rbac.namespaces }}
{{- range $namespace := (.Values.rbac.namespaces | uniq | sortAlpha) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kmcp.fullname" $ }}-manager-role
  namespace: {{ $namespace }}
  labels:
    {{- include "kmcp.labels" $ | nindent 4 }}
rules:
  {{- include "kmcp.manager.rules" $ | nindent 2 }}
{{- end }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kmcp.fullname" . }}-manager-role
  labels:
    {{- include "kmcp.labels" . | nindent 4 }}
rules:
  {{- include "kmcp.manager.rules" . | nindent 2 }}
{{- end }}
{{- end }} 